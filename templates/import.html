{% extends "base.html" %}
{% block title %}Import Birthdays{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width:600px;margin:auto;text-align:center;">

        <h1>📥 Import Birthdays</h1>

        <p style="color:var(--subtext);">Upload a CSV file with columns: Name, Phone, Birthday, Message</p>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".csv" required>
            <div style="display:flex;justify-content:center;gap:10px;margin-top:10px;">
                <button type="submit" class="btn-import">📤 Upload CSV</button>
                <a href="/"><button type="button" class="btn-home">🏠 Home</button></a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
