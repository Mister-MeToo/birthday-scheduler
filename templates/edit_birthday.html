{% extends "base.html" %}
{% block title %}Edit Birthday{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width:550px;margin:auto;">

        <h1 style="text-align:center;">✏️ Edit Birthday</h1>

        <form method="POST" enctype="multipart/form-data">

            <label>Profile Photo</label>
            <div style="display:flex;align-items:center;gap:15px;margin-bottom:20px;">
                {% if birthday[5] %}
                <img id="preview" src="{{ birthday[5] }}" alt="Photo"
                     style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #3498db;flex-shrink:0;">
                {% else %}
                <div id="placeholder" style="width:80px;height:80px;border-radius:50%;background:#3498db;
                    color:white;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;">
                    {{ birthday[1][0].upper() }}
                </div>
                <img id="preview" src="" alt="Preview"
                     style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #3498db;display:none;flex-shrink:0;">
                {% endif %}
                <div>
                    <label style="display:inline-block;padding:10px 16px;background:#3498db;color:white;
                    border-radius:8px;cursor:pointer;font-weight:bold;margin:0;" for="photo">
                        📷 Change Photo
                    </label>
                    <input type="file" id="photo" name="photo" accept="image/*" onchange="previewPhoto(this)"
                           style="display:none;">
                    <p style="margin:5px 0 0;color:var(--subtext);font-size:13px;">Leave empty to keep current</p>
                </div>
            </div>

            <label>Full Name</label>
            <input type="text" name="name" value="{{ birthday[1] }}" required>

            <label>Phone Number</label>
            <input type="text" name="phone" value="{{ birthday[2] }}" required>

            <label>Birthday</label>
            <input type="date" name="birthday" value="{{ birthday[3] }}" required>

            <label>Message Template</label>
            <textarea name="message" rows="4">{{ birthday[4] }}</textarea>

            <button type="submit" class="btn-edit" style="width:100%;padding:14px;font-size:16px;">
                💾 Save Changes
            </button>
        </form>

        <a href="/birthdays" style="display:block;text-align:center;margin-top:15px;color:#3498db;">
            ← Back to Birthdays
        </a>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function previewPhoto(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview');
                const placeholder = document.getElementById('placeholder');
                preview.src = e.target.result;
                preview.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }
</script>
{% endblock %}
