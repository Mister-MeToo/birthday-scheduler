<!DOCTYPE html>
<html>
<head>
    <title>Edit Birthday</title>
</head>
<body>

    <h1>Edit Birthday</h1>

    <form method="POST">

        <label>Name:</label><br>
        <input
            type="text"
            name="name"
            value="{{ birthday[1] }}"
            required
        >
        <br><br>

        <label>Phone:</label><br>
        <input
            type="text"
            name="phone"
            value="{{ birthday[2] }}"
            required
        >
        <br><br>

        <label>Birthday:</label><br>
        <input
            type="date"
            name="birthday"
            value="{{ birthday[3] }}"
            required
        >
        <br><br>

        <label>Message:</label><br>
        <textarea name="message">{{ birthday[4] }}</textarea>
        <br><br>

        <button type="submit">
            Save Changes
        </button>

    </form>

    <br>

    <a href="/birthdays">
        <button>Back</button>
    </a>

</body>
</html>
